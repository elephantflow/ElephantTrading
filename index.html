<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElephantTrading · 资产价格追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --accent: #1f6feb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 span.logo { font-size: 22px; }
    .updated { color: var(--muted); font-size: 12px; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Summary Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .card:hover, .card.active { border-color: var(--accent); }
    .card .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .card .price { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .card .change { font-size: 12px; margin-top: 4px; display: flex; gap: 8px; align-items: center; }
    .card .trend-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600;
    }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--yellow); }
    .badge-up { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-down { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-flat { background: rgba(210,153,34,0.15); color: var(--yellow); }

    /* Chart area */
    .chart-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chart-title { font-size: 16px; font-weight: 600; }
    .range-btns { display: flex; gap: 6px; }
    .range-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .range-btn:hover, .range-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .chart-container { position: relative; height: 320px; }

    /* Analysis */
    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .analysis-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .analysis-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); }
    .stat-val { font-variant-numeric: tabular-nums; }

    /* Trend Summary */
    .trend-summary {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .trend-summary h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .trend-rows { display: flex; flex-direction: column; gap: 10px; }
    .trend-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      background: rgba(255,255,255,0.03);
    }
    .trend-row .asset-name {
      font-weight: 600;
      min-width: 80px;
    }
    .trend-row .trend-text { color: var(--muted); line-height: 1.6; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 24px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--blue); text-decoration: none; }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      main { padding: 12px; }
      .chart-container { height: 240px; }
    }
  </style>
</head>
<body>

<header>
  <h1><span class="logo">🐘</span> ElephantTrading · 资产价格追踪</h1>
  <div class="updated" id="lastUpdated">加载中...</div>
</header>

<main>
  <div class="cards" id="cards">
    <div class="loading">正在加载数据...</div>
  </div>

  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title" id="chartTitle">黄金 XAU/USD</div>
      <div class="range-btns">
        <button class="range-btn" onclick="setRange(30)">1M</button>
        <button class="range-btn active" onclick="setRange(90)">3M</button>
        <button class="range-btn" onclick="setRange(180)">6M</button>
        <button class="range-btn" onclick="setRange(365)">1Y</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>
  </div>

  <div class="analysis-grid" id="analysisGrid"></div>

  <div class="trend-summary">
    <h2>📊 趋势分析摘要</h2>
    <div class="trend-rows" id="trendRows">
      <div class="loading">正在生成分析...</div>
    </div>
  </div>
</main>

<footer>
  数据来源：<a href="https://www.frankfurter.app" target="_blank">Frankfurter (ECB)</a>、
  <a href="https://stooq.com" target="_blank">Stooq</a> · DXY 由官方权重公式计算 ·
  每2小时自动更新 · <a href="https://github.com/elephantflow/ElephantTrading" target="_blank">GitHub</a>
</footer>

<script>
// ============================================================
// CONFIG
// ============================================================
const ASSETS = [
  { key: 'xauusd', label: '黄金', name: 'XAU/USD', unit: 'USD/oz', color: '#d4a017', decimals: 2 },
  { key: 'dxy',    label: '美元指数', name: 'DXY',    unit: '',       color: '#58a6ff', decimals: 3 },
  { key: 'eurusd', label: '欧元',   name: 'EUR/USD', unit: '',       color: '#3fb950', decimals: 5 },
  { key: 'usdjpy', label: '日元',   name: 'USD/JPY', unit: '',       color: '#bc8cff', decimals: 3 },
];

let allData = [];
let currentAsset = ASSETS[0];
let currentRange = 90;
let chart = null;

// ============================================================
// DATA LOADING
// ============================================================
async function loadData() {
  const res = await fetch('data/prices.json?t=' + Date.now());
  allData = await res.json();
  return allData;
}

function getSlice(days) {
  if (!allData.length) return [];
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutStr = cutoff.toISOString().split('T')[0];
  return allData.filter(r => r.date >= cutStr);
}

// ============================================================
// MOVING AVERAGE
// ============================================================
function movingAvg(data, key, n) {
  return data.map((_, i) => {
    const slice = data.slice(Math.max(0, i - n + 1), i + 1).map(d => d[key]).filter(v => v !== null);
    if (slice.length < Math.ceil(n / 2)) return null;
    return slice.reduce((a, b) => a + b, 0) / slice.length;
  });
}

// ============================================================
// TREND ANALYSIS
// ============================================================
function analyzeTrend(data, key) {
  const vals = data.map(d => d[key]).filter(v => v !== null);
  if (vals.length < 5) return null;

  const latest = vals[vals.length - 1];
  const prev1d = vals[vals.length - 2] || latest;
  const prev7d = vals[Math.max(0, vals.length - 6)] || vals[0];
  const prev30d = vals[Math.max(0, vals.length - 22)] || vals[0];
  const minVal = Math.min(...vals);
  const maxVal = Math.max(...vals);

  const chg1d = (latest - prev1d) / prev1d * 100;
  const chg7d = (latest - prev7d) / prev7d * 100;
  const chg30d = (latest - prev30d) / prev30d * 100;

  // 趋势判断（基于近30天线性回归斜率）
  const recent = vals.slice(-22);
  const n = recent.length;
  const xMean = (n - 1) / 2;
  const yMean = recent.reduce((a, b) => a + b, 0) / n;
  let num = 0, den = 0;
  recent.forEach((y, i) => { num += (i - xMean) * (y - yMean); den += (i - xMean) ** 2; });
  const slope = den ? num / den : 0;
  const slopePct = slope / yMean * 100;

  let trend, trendClass;
  if (Math.abs(slopePct) < 0.05) { trend = '震荡整理'; trendClass = 'flat'; }
  else if (slopePct > 0) { trend = slopePct > 0.15 ? '强势上涨' : '温和上涨'; trendClass = 'up'; }
  else { trend = slopePct < -0.15 ? '明显下跌' : '温和下跌'; trendClass = 'down'; }

  return { latest, chg1d, chg7d, chg30d, minVal, maxVal, trend, trendClass };
}

function fmt(val, decimals) {
  if (val === null || val === undefined) return '--';
  return val.toFixed(decimals);
}

function fmtChg(pct) {
  if (pct === null || pct === undefined || isNaN(pct)) return '--';
  const sign = pct >= 0 ? '+' : '';
  return `${sign}${pct.toFixed(2)}%`;
}

// ============================================================
// RENDER CARDS
// ============================================================
function renderCards() {
  const slice30 = getSlice(30);
  const slice1 = getSlice(2);

  const cards = ASSETS.map(asset => {
    const stats = analyzeTrend(slice30, asset.key);
    if (!stats) return `<div class="card" onclick="selectAsset('${asset.key}')">
      <div class="label">${asset.label} · ${asset.name}</div>
      <div class="price">--</div>
    </div>`;

    const chgClass = stats.chg1d > 0 ? 'up' : stats.chg1d < 0 ? 'down' : 'flat';
    const badgeClass = stats.trendClass === 'up' ? 'badge-up' : stats.trendClass === 'down' ? 'badge-down' : 'badge-flat';
    const arrow = stats.chg1d > 0 ? '▲' : stats.chg1d < 0 ? '▼' : '◆';
    const trendIcon = stats.trendClass === 'up' ? '↗' : stats.trendClass === 'down' ? '↘' : '→';

    return `<div class="card ${currentAsset.key === asset.key ? 'active' : ''}" onclick="selectAsset('${asset.key}')">
      <div class="label">${asset.label} · ${asset.name}</div>
      <div class="price">${fmt(stats.latest, asset.decimals)}</div>
      <div class="change">
        <span class="${chgClass}">${arrow} ${fmtChg(stats.chg1d)} 今日</span>
        <span class="trend-badge ${badgeClass}">${trendIcon} ${stats.trend}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('cards').innerHTML = cards;
}

// ============================================================
// RENDER CHART
// ============================================================
function renderChart() {
  const slice = getSlice(currentRange);
  const asset = currentAsset;

  document.getElementById('chartTitle').textContent = `${asset.label} · ${asset.name}`;

  const labels = slice.map(d => d.date);
  const values = slice.map(d => d[asset.key]);
  const ma7 = movingAvg(slice, asset.key, 7);
  const ma30 = movingAvg(slice, asset.key, 30);

  const ctx = document.getElementById('mainChart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: asset.name,
          data: values,
          borderColor: asset.color,
          backgroundColor: asset.color + '18',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
        },
        {
          label: 'MA7',
          data: ma7,
          borderColor: '#f0a500',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: false,
          borderDash: [4, 3],
        },
        {
          label: 'MA30',
          data: ma30,
          borderColor: '#f85149',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: false,
          borderDash: [8, 4],
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#8b949e', boxWidth: 20, padding: 12, font: { size: 12 } }
        },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#e6edf3',
          bodyColor: '#8b949e',
          callbacks: {
            label: (ctx) => {
              if (ctx.parsed.y === null) return '';
              return `  ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(asset.decimals)}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#8b949e',
            maxTicksLimit: 8,
            font: { size: 11 },
            maxRotation: 0,
          },
          grid: { color: '#21262d' }
        },
        y: {
          ticks: {
            color: '#8b949e',
            font: { size: 11 },
            callback: v => v !== null ? v.toFixed(asset.decimals) : '',
          },
          grid: { color: '#21262d' }
        }
      }
    }
  });
}

// ============================================================
// RENDER ANALYSIS CARDS
// ============================================================
function renderAnalysis() {
  const slice = getSlice(365);

  const html = ASSETS.map(asset => {
    const stats = analyzeTrend(slice, asset.key);
    if (!stats) return '';

    return `<div class="analysis-card">
      <h3>${asset.label} · ${asset.name}</h3>
      <div class="stat-row">
        <span class="stat-label">最新</span>
        <span class="stat-val">${fmt(stats.latest, asset.decimals)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">日涨跌</span>
        <span class="stat-val ${stats.chg1d > 0 ? 'up' : stats.chg1d < 0 ? 'down' : 'flat'}">${fmtChg(stats.chg1d)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">近7日</span>
        <span class="stat-val ${stats.chg7d > 0 ? 'up' : stats.chg7d < 0 ? 'down' : 'flat'}">${fmtChg(stats.chg7d)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">近30日</span>
        <span class="stat-val ${stats.chg30d > 0 ? 'up' : stats.chg30d < 0 ? 'down' : 'flat'}">${fmtChg(stats.chg30d)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">近1年最低</span>
        <span class="stat-val">${fmt(stats.minVal, asset.decimals)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">近1年最高</span>
        <span class="stat-val">${fmt(stats.maxVal, asset.decimals)}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('analysisGrid').innerHTML = html;
}

// ============================================================
// RENDER TREND SUMMARY TEXT
// ============================================================
function renderTrendSummary() {
  const slice365 = getSlice(365);
  const slice30 = getSlice(30);

  const rows = ASSETS.map(asset => {
    const s365 = analyzeTrend(slice365, asset.key);
    const s30 = analyzeTrend(slice30, asset.key);
    if (!s365) return '';

    const trendIcon = s365.trendClass === 'up' ? '↗' : s365.trendClass === 'down' ? '↘' : '→';
    const trendClass = s365.trendClass;

    // 生成分析文字
    let text = '';
    const yr30 = s365.chg30d;
    const yr7 = s365.chg7d;

    text += `近1年累计 <span class="${yr30 > 0 ? 'up' : yr30 < 0 ? 'down' : 'flat'}">${fmtChg(yr30)}</span>，`;
    text += `近7日 <span class="${yr7 > 0 ? 'up' : yr7 < 0 ? 'down' : 'flat'}">${fmtChg(yr7)}</span>。`;
    text += `近30日呈<strong class="${trendClass}">${s365.trend}</strong>态势。`;

    // 与1年高低点比较
    const distFromHigh = (s365.latest - s365.maxVal) / s365.maxVal * 100;
    const distFromLow = (s365.latest - s365.minVal) / s365.minVal * 100;
    if (distFromHigh > -3) {
      text += ` 当前价格接近<span class="up">年内高点</span>（距高点 ${Math.abs(distFromHigh).toFixed(1)}%）。`;
    } else if (distFromLow < 5) {
      text += ` 当前价格接近<span class="down">年内低点</span>（距低点 ${distFromLow.toFixed(1)}%）。`;
    } else {
      text += ` 当前处于年内高低点中间位置（距高点 ${Math.abs(distFromHigh).toFixed(1)}%，距低点 ${distFromLow.toFixed(1)}%）。`;
    }

    return `<div class="trend-row">
      <div>
        <div class="asset-name">${asset.label}<br><span style="font-size:11px;color:var(--muted);font-weight:400">${asset.name}</span></div>
      </div>
      <div class="trend-text">${text}</div>
    </div>`;
  }).join('');

  document.getElementById('trendRows').innerHTML = rows;
}

// ============================================================
// INTERACTIONS
// ============================================================
function selectAsset(key) {
  currentAsset = ASSETS.find(a => a.key === key) || ASSETS[0];
  renderCards();
  renderChart();
}

function setRange(days) {
  currentRange = days;
  document.querySelectorAll('.range-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderChart();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    await loadData();

    if (allData.length) {
      const last = allData[allData.length - 1];
      document.getElementById('lastUpdated').textContent = `最后更新：${last.date} · 共 ${allData.length} 条记录`;
    }

    renderCards();
    renderChart();
    renderAnalysis();
    renderTrendSummary();
  } catch (e) {
    document.getElementById('cards').innerHTML = `<div class="loading" style="color:var(--red)">数据加载失败：${e.message}</div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
